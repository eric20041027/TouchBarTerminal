name: TouchBarTerminal
options:
  bundleIdPrefix: com.smallfire
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    ARCHS: "$(ARCHS_STANDARD)"
    CODE_SIGN_STYLE: Automatic

targets:
  TouchBarTerminal:
    type: application
    platform: macOS
    sources:
      - path: TouchBarTerminal
      - path: docs
        type: folder    # 當作資源資料夾，不編譯
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.smallfire.TouchBarTerminal
        INFOPLIST_FILE: TouchBarTerminal/App/Info.plist
        CODE_SIGN_ENTITLEMENTS: TouchBarTerminal/App/TouchBarTerminal.entitlements

  TouchBarTerminalTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: TouchBarTerminalTests
    dependencies:
      - target: TouchBarTerminal
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.smallfire.TouchBarTerminalTests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGNING_ALLOWED: NO
